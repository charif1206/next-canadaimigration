name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup with dependency caching ─────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Generate Prisma client (required for TypeScript type-checking) ─
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_db

      # ── 5. Lint ───────────────────────────────────────────────────────────
      - name: Lint
        run: npm run lint

      # ── 6. TypeScript type-check ──────────────────────────────────────────
      - name: Type-check
        run: npx tsc --noEmit

      # ── 7. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: npm run build
        env:
          # Dummy values so Next.js build doesn't error on missing env vars.
          # Real secrets are injected by Vercel at deploy time.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_db
          JWT_SECRET: ci-placeholder-secret-at-least-32-characters-long
          NEXT_PUBLIC_API_URL: /api
          NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
          MAIL_HOST: localhost
          MAIL_PORT: "1025"
          MAIL_USER: ci
          MAIL_PASSWORD: ci
          MAIL_FROM: ci@ci.com
          ADMIN_EMAIL: ci@ci.com
          CLOUDINARY_CLOUD_NAME: ci
          CLOUDINARY_API_KEY: ci
          CLOUDINARY_API_SECRET: ci
          NEXT_TELEMETRY_DISABLED: "1"
