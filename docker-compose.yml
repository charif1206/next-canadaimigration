services:
  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: canada_immigration_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: immigration_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Next.js Application
  # ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: canada_immigration_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database — points to the postgres service above
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/immigration_db?schema=public

      # App URLs
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000

      # JWT — replace with a strong secret
      JWT_SECRET: change-this-to-a-long-random-secret-at-least-32-chars

      # Email / SMTP — fill in your SMTP provider details
      MAIL_HOST: sandbox.smtp.mailtrap.io
      MAIL_PORT: "587"
      MAIL_USER: your_mailtrap_user
      MAIL_PASSWORD: your_mailtrap_password
      MAIL_FROM: "Canada Immigration <noreply@immigration.ca>"
      ADMIN_EMAIL: admin@example.com

      # Cloudinary — fill in your credentials
      CLOUDINARY_CLOUD_NAME: your_cloud_name
      CLOUDINARY_API_KEY: your_api_key
      CLOUDINARY_API_SECRET: your_api_secret

      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  postgres_data:
